FLAC=/home/linuxbrew/.linuxbrew/bin/flac
CDROMREADERSYNTAX=libcdio
CDDBMETHOD=musicbrainz
CD_PARANOIA=cd-paranoia
OUTPUTTYPE=flac

# Output format: Artist/Album/01 Track Name.flac
OUTPUTFORMAT='${ARTISTFILE}/${ALBUMFILE}/${TRACKNUM} ${TRACKFILE}'
VAOUTPUTFORMAT='Various Artists/${ALBUMFILE}/${TRACKNUM} ${ARTISTFILE} - ${TRACKFILE}'

# Keep spaces in filenames (override default munging)
mungefilename ()
{
    echo "$@"
}

# Album art - fetch and embed
ACTIONS=default,getalbumart,embedalbumart,replaygain
ALBUMARTFILE="cover.jpg"

# Post-encode hook to fetch artist photo and fix album art
post_encode() {
    local artist_dir="${OUTPUTDIR}/${ARTISTFILE}"
    local album_dir="${OUTPUTDIR}/${ARTISTFILE}/${ALBUMFILE}"
    local artist_photo="${artist_dir}/folder.jpg"
    local glyrc_bin="/home/linuxbrew/.linuxbrew/bin/glyrc"
    
    # Fetch artist photo if missing
    if [ ! -f "$artist_photo" ] && [ -x "$glyrc_bin" ]; then
        echo "Fetching artist photo for ${ARTISTFILE}..."
        "$glyrc_bin" artistphoto --artist "${CDARTIST}" --write "$artist_photo" >/dev/null 2>&1 &
    fi
    
    # Move album art from backup to album folder
    if [ -d "${album_dir}/albumart_backup" ]; then
        mv "${album_dir}/albumart_backup/cover.jpg" "${album_dir}/cover.jpg" 2>/dev/null
        rmdir "${album_dir}/albumart_backup" 2>/dev/null
    fi

    # Set ALBUMARTIST tag on all FLAC files
    for flac_file in "${album_dir}"/*.flac; do
        if [ -f "$flac_file" ]; then
            metaflac --set-tag="ALBUMARTIST=${CDARTIST}" "$flac_file"
        fi
    done
}

EJECTCD=y
OUTPUTDIR=~/Music
